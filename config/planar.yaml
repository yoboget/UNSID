
data:
  max_num_nodes: 64

training:
  batch_size: 64
  learning_rate: 0.0002
  lr_decay: 0.5
  decay_iteration: 200_000
  betas:
    beta1: 0.9
    beta2: 0.999
  epochs: 150_000
  val_size: 40
  #dropout: 0

model:
  architecture: 'GPS'
  nhf: 256
  edge_node_ratio: 4
  n_layers: 8
  mlp_n_layers: 3
  normalization: layer_norm
  T: 512
  prior: normal # 'dirch = dirichlet' 'masking', 'absorbing', 'marginal'
  scale: 1.0

conditioning:
  classifier_guidance: False
  classifier_free_guidance: False
  lambda_cfg: 1.0
  lambda_guidance: 1.0

extra_features:
  spectral_embeddings: False
  k: 0
  graph_size: True
  molecular_feat: False
  cycles: False
  rrwp: False
  discrete_features: False

sampling:
  id: True
  critical: False
  node_alpha: 1.0
  edge_alpha: 1.0
  ckp: 'avg'

log:
  n_loggin_steps: 1000
  n_loggin_epochs: 1000
  n_test_samples: 10
  n_val_samples: 32
  sampling_batch_size: 40
  n_samples_generation: 40
  save_graphs: False